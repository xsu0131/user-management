---
- name: Install MySQL
  ansible.builtin.apt:
    name:
      - mysql-server
    state: present
    update_cache: true

- name: Ensure MySQL service is running
  ansible.builtin.service:
    name: mysql
    state: started
    enabled: true

- name: Get this host private IP
  ansible.builtin.set_fact:
    db_private_ip: "{{ ansible_default_ipv4.address }}"

- name: Bind MySQL to private IP only
  ansible.builtin.lineinfile:
    path: /etc/mysql/mysql.conf.d/mysqld.cnf
    regexp: '^bind-address\s*='
    line: "bind-address = {{ db_private_ip }}"
  notify: Restart mysql

- name: Create database (users)
  ansible.builtin.shell:
    mysql -e "CREATE DATABASE IF NOT EXISTS {{ mysql_db }};"
  args:
    executable: /bin/bash
  changed_when: false

- name: Create app DB user (admin) with remote access
  ansible.builtin.shell: |
    mysql -e "CREATE USER IF NOT EXISTS '{{ mysql_user }}'@'%' IDENTIFIED BY '{{ mysql_password }}';"
    mysql -e "GRANT ALL PRIVILEGES ON {{ mysql_db }}.* TO '{{ mysql_user }}'@'%';"
    mysql -e "FLUSH PRIVILEGES;"
  args:
    executable: /bin/bash
  changed_when: false
