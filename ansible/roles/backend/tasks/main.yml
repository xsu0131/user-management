---
# =========================
# Backend role – tasks
# =========================

- name: Ensure apt cache is up to date
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install Java 21
  apt:
    name: openjdk-21-jdk
    state: present

- name: Create backend application directory
  file:
    path: /opt/backend
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'

# Jenkins passes:
# -e backend_jar_path=../user-management-backend/target/*.jar
- name: Copy backend JAR
  copy:
    src: "{{ backend_jar_path }}"
    dest: /opt/backend/app.jar
    owner: ubuntu
    group: ubuntu
    mode: '0755'

- name: Create systemd service for backend
  copy:
    dest: /etc/systemd/system/backend.service
    content: |
      [Unit]
      Description=Spring Boot Backend
      After=network.target

      [Service]
      User=ubuntu
      WorkingDirectory=/opt/backend
      ExecStart=/usr/bin/java -jar /opt/backend/app.jar
      Restart=always
      RestartSec=5
      SuccessExitStatus=143

      [Install]
      WantedBy=multi-user.target

- name: Reload systemd
  command: systemctl daemon-reexec

- name: Enable backend service
  systemd:
    name: backend
    enabled: yes

- name: Restart backend service
  systemd:
    name: backend
    state: restarted
