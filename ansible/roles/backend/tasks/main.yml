---
- name: Install Java 21
  ansible.builtin.apt:
    name: openjdk-21-jdk
    state: present
    update_cache: true

- name: Create app directory
  ansible.builtin.file:
    path: /opt/user-management
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"

# For now we assume you will SCP the jar to the backend box.
# Later we’ll make Jenkins publish it automatically.
- name: Placeholder - ensure jar exists (will fail until you upload jar)
  ansible.builtin.stat:
    path: "{{ backend_jar_path }}"
  register: backend_jar_stat

- name: Print message if jar missing
  ansible.builtin.debug:
    msg: "Upload your backend jar to {{ backend_jar_path }} (we’ll automate via Jenkins next)."
  when: not backend_jar_stat.stat.exists

- name: Create systemd service for backend
  ansible.builtin.copy:
    dest: /etc/systemd/system/{{ backend_service_name }}.service
    mode: "0644"
    content: |
      [Unit]
      Description=User Management Backend
      After=network.target

      [Service]
      Type=simple
      User=ubuntu
      WorkingDirectory=/opt/user-management
      ExecStart=/usr/bin/java -jar {{ backend_jar_path }}
      Restart=always
      RestartSec=5
      Environment=SPRING_DATASOURCE_URL=jdbc:mysql://{{ hostvars['db1']['ansible_default_ipv4']['address'] }}:3306/{{ mysql_db }}
      Environment=SPRING_DATASOURCE_USERNAME={{ mysql_user }}
      Environment=SPRING_DATASOURCE_PASSWORD={{ mysql_password }}

      [Install]
      WantedBy=multi-user.target
  notify: Restart backend

- name: Enable backend service
  ansible.builtin.systemd:
    name: "{{ backend_service_name }}"
    enabled: true
    daemon_reload: true
