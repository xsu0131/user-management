---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install Java 21 (required by Jenkins)
  ansible.builtin.apt:
    name: openjdk-21-jdk
    state: present

- name: Install snapd
  ansible.builtin.apt:
    name: snapd
    state: present

- name: Ensure snapd is running
  ansible.builtin.service:
    name: snapd
    state: started
    enabled: true

- name: Install Jenkins via snap (LTS)
  ansible.builtin.command:
    cmd: snap install jenkins --classic
    creates: /snap/bin/jenkins

- name: Ensure Jenkins service is running
  ansible.builtin.service:
    name: snap.jenkins.jenkins
    state: started
    enabled: true
