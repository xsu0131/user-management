---
- name: Common bootstrap on all servers
  hosts: all
  become: true
  roles:
    - common

- name: Setup DB server
  hosts: db
  become: true
  roles:
    - db

- name: Setup Backend server
  hosts: backend
  become: true
  roles:
    - backend

- name: Setup Frontend server
  hosts: frontend
  become: true
  roles:
    - frontend
